# =============================================================================
#  校园云盘系统 - 主配置文件
#  说明：占位符 ${xxx} 表示需替换为实际值，或在 application-local.yml 中覆盖
#  地域：阿里云 OSS 新加坡节点（ap-southeast-1）
# =============================================================================

# ===== Spring Boot 基础配置 =====
spring:
  application:
    name: campus-cloudisk   # 应用名称（注册中心/日志中识别用）

  # ===== 激活环境配置 =====
  # 开发环境使用 dev，生产环境使用 prod，本地调试使用 local
  # 对应文件：application-dev.yml / application-prod.yml / application-local.yml
  profiles:
    active: dev

  # ===== 数据源（MySQL）配置 =====
  datasource:
    # 驱动类（MySQL 8.x 用 com.mysql.cj.jdbc.Driver）
    driver-class-name: com.mysql.cj.jdbc.Driver
    # URL 说明：
    #   campus_cloud  → 数据库名，请先在 MySQL 中执行 schema.sql 建库建表
    #   serverTimezone=Asia/Shanghai → 时区设置，防止时间偏移 8 小时
    #   useSSL=false → 本地开发可关闭 SSL，生产环境建议开启
    #   allowPublicKeyRetrieval=true → MySQL 8 RSA 公钥检索，避免连接报错
    url: jdbc:mysql://localhost:3306/campus_cloud?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root              # 替换为你的 MySQL 用户名
    password: your_password     # 替换为你的 MySQL 密码（生产环境请使用环境变量）

    # HikariCP 连接池配置（Spring Boot 默认连接池，性能最优）
    hikari:
      minimum-idle: 5           # 最小空闲连接数
      maximum-pool-size: 20     # 最大连接数（根据服务器配置调整）
      idle-timeout: 600000      # 空闲连接超时时间（ms），600秒
      max-lifetime: 1800000     # 连接最大存活时间（ms），30分钟
      connection-timeout: 30000 # 获取连接超时时间（ms），30秒
      connection-test-query: SELECT 1  # 连接检活 SQL

  # ===== Redis 配置（会话缓存 / 分布式锁 / 文件元数据缓存）=====
  redis:
    host: 127.0.0.1             # Redis 服务地址（生产环境替换为实际 IP）
    port: 6379                  # Redis 端口，默认 6379
    password:                   # Redis 密码（无密码则留空）
    database: 0                 # 使用的数据库编号（0~15）
    timeout: 3000ms             # 连接超时时间

    # Lettuce 连接池（Spring Boot 默认使用 Lettuce）
    lettuce:
      pool:
        min-idle: 2             # 最小空闲连接
        max-idle: 8             # 最大空闲连接
        max-active: 16          # 最大活跃连接数
        max-wait: 1000ms        # 获取连接最大等待时间

  # ===== 文件上传配置 =====
  servlet:
    multipart:
      enabled: true
      # 单个文件最大大小（支持 KB/MB/GB，建议毕业设计演示设为 500MB）
      max-file-size: 500MB
      # 单次请求最大大小（通常比 max-file-size 稍大，兼容批量上传）
      max-request-size: 600MB

  # ===== Jackson 全局序列化配置 =====
  jackson:
    # 日期时间统一格式（LocalDateTime 序列化输出格式）
    date-format: yyyy-MM-dd HH:mm:ss
    # 时区设置，防止前后端时间不一致
    time-zone: GMT+8
    # Long 类型序列化为 String，防止前端 JS 精度丢失
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false  # 忽略未知字段，提升兼容性

# ===== MyBatis-Plus 配置 =====
mybatis-plus:
  # Mapper XML 文件位置（与 classpath 相对）
  mapper-locations: classpath*:/mapper/**/*.xml
  # 实体类包路径（别名扫描，Mapper XML 中可直接写类名而非全限定名）
  type-aliases-package: com.campus.cloudisk.entity
  configuration:
    # 开启驼峰命名自动转换（数据库 file_name → Java fileName）
    map-underscore-to-camel-case: true
    # 日志级别：开发环境用 stdout 打印 SQL，生产环境改为 org.apache.ibatis.logging.nologging.NoLoggingImpl
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    # 全局允许 null 字段更新（设为 false 则 updateById 忽略 null 字段）
    call-setters-on-nulls: false
  global-config:
    db-config:
      # 主键策略：ASSIGN_ID 使用雪花算法生成 Long 型 ID（分布式友好）
      id-type: ASSIGN_ID
      # 逻辑删除字段名（对应实体类中 @TableLogic 注解的字段）
      logic-delete-field: deleted
      # 逻辑删除值（1 = 已删除）
      logic-delete-value: 1
      # 逻辑未删除值（0 = 未删除）
      logic-not-delete-value: 0

# ===== 阿里云 OSS 配置（新加坡节点 ap-southeast-1）=====
# 注意：AccessKey 请勿提交到 Git，建议通过环境变量注入
aliyun:
  oss:
    # Endpoint（外网访问地址）
    # 新加坡节点：oss-ap-southeast-1.aliyuncs.com
    # 内网访问地址（ECS 部署时使用，节省流量）：oss-ap-southeast-1-internal.aliyuncs.com
    endpoint: oss-ap-southeast-1.aliyuncs.com
    # RAM 子账号 AccessKey（强烈建议使用子账号，而非 Root 账号）
    # 可通过环境变量覆盖：ALIYUN_OSS_ACCESS_KEY_ID
    access-key-id: your_access_key_id
    # AccessKey Secret
    # 可通过环境变量覆盖：ALIYUN_OSS_ACCESS_KEY_SECRET
    access-key-secret: your_access_key_secret
    # Bucket 名称（需提前在 OSS 控制台创建，建议设为私有权限）
    bucket-name: campus-cloudisk
    # 文件访问 URL 前缀（用于拼接公开文件的访问地址）
    # 格式：https://{bucket-name}.{endpoint}
    url-prefix: https://campus-cloudisk.oss-ap-southeast-1.aliyuncs.com
    # 预签名 URL 有效期（秒），默认 3600 秒 = 1 小时
    presigned-url-expire: 3600
    # OSS 文件存储目录前缀（文件将存储在此目录下）
    # 格式：{prefix}/{userId}/{year}/{month}/{uuid}.{ext}
    file-prefix: campus-files

# ===== JWT 配置 =====
jwt:
  # JWT 签名密钥（生产环境请替换为复杂随机字符串，至少 32 位）
  # 可通过环境变量覆盖：JWT_SECRET
  secret: campus-cloudisk-jwt-secret-key-2024-please-change-in-production
  # JWT Token 有效期（毫秒）
  # 86400000 ms = 24 小时
  # 生产环境建议设为 7200000 ms = 2 小时（安全性更高）
  expire: 86400000
  # Token 在请求头中的 Key 名称
  header: Authorization
  # Token 前缀（标准 Bearer 格式）
  prefix: Bearer

# ===== 文件存储配置（本地临时目录，分片上传缓存使用）=====
file:
  # 上传临时目录（分片上传的临时存储位置）
  # Windows 示例：C:/temp/campus-cloud/
  # Linux 示例：/tmp/campus-cloud/
  temp-dir: /tmp/campus-cloud/upload/
  # 允许上传的文件类型（白名单，逗号分隔的扩展名）
  allowed-types: jpg,jpeg,png,gif,bmp,webp,pdf,doc,docx,xls,xlsx,ppt,pptx,txt,md,zip,rar,7z,tar,gz,mp4,avi,mov,mp3,wav,flac
  # 单用户最大存储配额（字节），默认 5GB
  # 5 * 1024 * 1024 * 1024 = 5368709120
  user-quota: 5368709120

# ===== 跨域配置（CORS）=====
# 注意：生产环境请将 allowed-origins 替换为实际域名，不要使用 *
cors:
  # 允许的前端源地址（开发环境允许 localhost:5173 即 Vite 默认端口）
  allowed-origins: http://localhost:5173,http://localhost:3000
  # 允许的 HTTP 方法
  allowed-methods: GET,POST,PUT,DELETE,OPTIONS
  # 允许的请求头（Authorization 用于 JWT）
  allowed-headers: "*"
  # 允许携带 Cookie（JWT 模式下通常不需要，可设为 false）
  allow-credentials: true
  # 预检请求缓存时间（秒）
  max-age: 3600

# ===== 服务器配置 =====
server:
  # 后端监听端口，前端 request.js 中 baseURL 与此一致
  port: 8080
  servlet:
    # 接口统一前缀（可选，如果设置了则前端 baseURL 要加 /api）
    context-path: /
  # Tomcat 连接配置
  tomcat:
    # 请求头最大大小（JWT Token 较长，防止 400 Bad Request）
    max-http-header-size: 65536
    # URI 编码（支持中文文件名）
    uri-encoding: UTF-8
    # 最大线程数（并发上传时需要）
    threads:
      max: 200
      min-spare: 10

# ===== 日志配置 =====
logging:
  level:
    # 项目包日志级别（开发环境用 DEBUG，生产环境改为 INFO 或 WARN）
    com.campus.cloudisk: DEBUG
    # MyBatis SQL 日志（开发时打印完整 SQL，生产改为 WARN 关闭）
    com.campus.cloudisk.mapper: DEBUG
    # 连接池日志（HikariCP）
    com.zaxxer.hikari: WARN
    # Spring Security / JWT 相关
    org.springframework.security: WARN
  # 日志文件输出（相对路径，以 JAR 运行目录为基准）
  file:
    name: logs/campus-cloudisk.log
    max-size: 50MB        # 单个日志文件最大 50MB
    max-history: 30       # 保留最近 30 天的日志

# ===== Spring Actuator（健康检查，Kubernetes/负载均衡探针使用）=====
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics  # 仅暴露必要端点，生产环境勿暴露 env/beans
  endpoint:
    health:
      show-details: when-authorized   # 只有认证用户才能看详细健康信息
